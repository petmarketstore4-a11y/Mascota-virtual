<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pet Life</title>

<style>

body{
margin:0;
background:#f5f5f5;
font-family:Arial,sans-serif;
text-align:center;
}

.barra img{
width:100%;
max-width:1200px;
}

.escena{
position:relative;
max-width:1200px;
margin:auto;
}

.fondo{
width:100%;
display:block;
}

.perrito{
position:absolute;
bottom:30px;
left:35%;
width:180px;
animation:flotar 2.5s ease-in-out infinite;
}

.perrito img{
width:100%;
}

#dialogBox{
position:absolute;
right:10%;
top:25%;
width:280px;
min-height:120px;
background:white;
border-radius:20px;
padding:15px;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

#dialog{
font-size:20px;
color:#333;
line-height:1.4;
}

.botones{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
padding:20px;
}

.botones img{
width:120px;
cursor:pointer;
}

@keyframes flotar{
0%{
transform:translateY(0);
}
50%{
transform:translateY(-10px);
}
100%{
transform:translateY(0);
}
}

@media(max-width:768px){

.perrito{
width:120px;
left:30%;
}

.botones img{
width:90px;
}

#dialogBox{
width:140px;
min-height:80px;
padding:10px;
right:5%;
}

#dialog{
font-size:14px;
}

}

</style>
</head>
<body>

<div class="barra">
<img src="barra-removebg-preview.png">
</div>

<div class="escena">

<img class="fondo" src="casad.png">

<div class="perrito">
<img src="pelo-removebg-preview (2).png">
</div>

<div id="dialogBox">
<div id="dialog">
Hola humano, estoy feliz de verte.
</div>
</div>

</div>

<div class="botones">

<img src="boton de felicidad.png">

<img src="boton de salud.png">

<img src="boton de higiene.png">

<img src="boton de hambre.png">

<img src="boton de sueño.png">

<img src="boton de energia.png">

</div>

<script>

const dialogos = [

"Hola humano, estoy feliz de verte.",
"Gracias por cuidarme todos los días.",
"Me encanta pasar tiempo contigo.",
"Tengo un poco de hambre.",
"Hoy me siento lleno de energía.",
"Quiero jugar contigo un rato.",
"Estoy muy contento de estar aquí.",
"Necesito descansar un poco.",
"Gracias por visitarme.",
"Eres mi mejor amigo."

];

let indice = 0;

function hablar(){

const texto = dialogos[indice];

document.getElementById("dialog").textContent = texto;

if ('speechSynthesis' in window){

speechSynthesis.cancel();

const voz = new SpeechSynthesisUtterance(texto);

voz.lang = "es-ES";
voz.rate = 0.9;
voz.pitch = 1;

speechSynthesis.speak(voz);

}

indice++;

if(indice >= dialogos.length){
indice = 0;
}

}

setTimeout(hablar,1000);

setInterval(hablar,60000);

</script>

</body>
</html>
