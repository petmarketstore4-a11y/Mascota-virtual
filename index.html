<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Pet Life</title>

<style>

body{
margin:0;
background:#f5f5f5;
font-family:Arial,sans-serif;
text-align:center;
}

.barra img{
width:100%;
max-width:1200px;
}

.escena{
position:relative;
max-width:1200px;
margin:auto;
}

.fondo{
width:100%;
display:block;
}

.perrito{
position:absolute;
bottom:30px;
left:35%;
width:180px;
}

.perrito img{
width:100%;
}

.botones{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:10px;
padding:20px;
}

.botones img{
width:120px;
cursor:pointer;
}

@media(max-width:768px){

.perrito{
width:120px;
left:30%;
}

.botones img{
width:90px;
}

}

</style>
</head>
<body>

<div class="barra">
<img src="barra-removebg-preview.png">
</div>

<div class="escena">

<img class="fondo" src="casad.png">

<div class="perrito">
<img src="pelo-removebg-preview (2).png">
</div>

</div>

<div class="botones">

<img src="boton de felicidad.png">

<img src="boton de salud.png">

<img src="boton de higiene.png">

<img src="boton de hambre.png">

<img src="boton de sueño.png">

<img src="boton de energia.png">

</div>

</body>
</html>
